# Local/offline demo override.
# It avoids pulling node/postgres/minio images by using:
# - locally built web/dist served from nginx
# - SQLite inside the server container
# - a shared artifact volume between agent and server
#
# Usage:
#   npm --prefix web run build
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build server agent web

services:
  server:
    build:
      context: .
      dockerfile: deploy/dockerfiles/server.Dockerfile
    environment:
      DATABASE_URL: ""
      SQLITE_PATH: /data/mini_drop.db
      MINI_DROP_ARTIFACT_ROOT: /tmp/mini-drop
      MINIO_AUTO_CREATE_BUCKET: "0"
      MINI_DROP_GRPC_AUTH_ENABLED: "0"
    depends_on: !reset []
    volumes:
      - mini_drop_artifacts:/tmp/mini-drop
      - mini_drop_sqlite:/data

  agent:
    environment:
      AGENT_GRPC_ADDR: server:50051
      AGENT_UPLOAD_ARTIFACTS: "0"
      MINI_DROP_GRPC_TOKEN: ""
    depends_on: !override
      server:
        condition: service_healthy
    volumes:
      - mini_drop_artifacts:/tmp/mini-drop

  web:
    build:
      context: .
      dockerfile: deploy/dockerfiles/web.prebuilt.Dockerfile
    depends_on:
      server:
        condition: service_healthy

volumes:
  mini_drop_artifacts:
  mini_drop_sqlite:
