# Use this override when Docker cannot pull node:20-alpine.
# Build the frontend locally first:
#   npm --prefix web run build
# Then build/run with:
#   docker compose -f docker-compose.yml -f docker-compose.prebuilt-web.yml build web
#   docker compose -f docker-compose.yml -f docker-compose.prebuilt-web.yml up -d

services:
  web:
    build:
      context: .
      dockerfile: deploy/dockerfiles/web.prebuilt.Dockerfile
