# 三机部署：仅在 Control VM 启动。不会启动本机 Agent。
#
# cp deploy/env/control.env.example deploy/env/control.env
# bash deploy/scripts/generate-dev-certs.sh <control-IP-or-DNS>
# docker compose --env-file deploy/env/control.env -f docker-compose.control.yml up -d --build

name: mini-drop-control

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mini_drop}
      POSTGRES_USER: ${POSTGRES_USER:-mini_drop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mini_drop}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-08T15-41-24Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?set MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?set MINIO_SECRET_KEY}
    ports:
      - "${CONTROL_BIND_ADDRESS:-0.0.0.0}:${CONTROL_MINIO_PORT:-9000}:9000"
    expose:
      - "9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: deploy/dockerfiles/server.Dockerfile
    environment:
      MINI_DROP_ENV: ${MINI_DROP_ENV:-vm}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-mini_drop}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mini_drop}
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:?set externally reachable MINIO_PUBLIC_ENDPOINT}
      MINIO_PUBLIC_SECURE: ${MINIO_PUBLIC_SECURE:-0}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-mini-drop}
      MINIO_AUTO_CREATE_BUCKET: "1"
      MINI_DROP_API_AUTH_ENABLED: "1"
      MINI_DROP_API_KEY: ${MINI_DROP_API_KEY:?set MINI_DROP_API_KEY}
      MINI_DROP_GRPC_AUTH_ENABLED: "1"
      MINI_DROP_GRPC_TOKEN: ${MINI_DROP_GRPC_TOKEN:?set MINI_DROP_GRPC_TOKEN}
      MINI_DROP_GRPC_SECURE: "1"
      MINI_DROP_GRPC_CERT_FILE: /certs/server.crt
      MINI_DROP_GRPC_KEY_FILE: /certs/server.key
      MINI_DROP_GRPC_DISTRIBUTE_MINIO_CREDENTIALS: "0"
      MINI_DROP_ALLOWED_SERVICES: ${MINI_DROP_ALLOWED_SERVICES:-}
      MINI_DROP_AI_ENABLED: ${MINI_DROP_AI_ENABLED:-off}
      MINI_DROP_AI_PROVIDER: ${MINI_DROP_AI_PROVIDER:-deepseek}
      MINI_DROP_AI_BASE_URL: ${MINI_DROP_AI_BASE_URL:-https://api.deepseek.com}
      MINI_DROP_AI_API_KEY: ${MINI_DROP_AI_API_KEY:-}
      MINI_DROP_AI_MODEL: ${MINI_DROP_AI_MODEL:-deepseek-v4-flash}
    ports:
      - "${CONTROL_BIND_ADDRESS:-0.0.0.0}:${CONTROL_GRPC_PORT:-50051}:50051"
    expose:
      - "8191"
    volumes:
      - ./deploy/certs:/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8191/api/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: deploy/dockerfiles/web.control.Dockerfile
    ports:
      - "${CONTROL_BIND_ADDRESS:-0.0.0.0}:${CONTROL_HTTP_PORT:-80}:80"
      - "${CONTROL_BIND_ADDRESS:-0.0.0.0}:${CONTROL_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/certs:/certs:ro
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --no-check-certificate --spider https://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
