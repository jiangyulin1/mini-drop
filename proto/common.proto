// common.proto — Mini-Drop 通用数据结构
//
// 被 init.proto / healthcheck.proto / hotmethod.proto / control.proto 共同引用。
// 所有 proto 文件使用 proto3 语法，字段编号不可重用以保向后兼容。

syntax = "proto3";

package mini_drop;

option go_package = "github.com/jiangyulin1/mini-drop/proto;mini_drop";


// PidStats 记录进程级资源占用快照。
// Agent 每次心跳上报自身及子进程的 PidStats，
// 用于性能自证（证明采集探针自身开销不会打挂目标进程）。
message PidStats {
  float cpu_percent    = 1;  // 1 秒窗口 CPU 占用百分比
  float rss_mb         = 2;  // RSS 物理内存占用 (MB)
  float read_kb_s      = 3;  // 磁盘读速率 (KB/s)
  float write_kb_s     = 4;  // 磁盘写速率 (KB/s)
  int32 children_count = 5;  // 子进程数量
}


// CosConfig 对象存储访问凭证。
// Agent 启动时通过 InitAgent.FetchConfig 获取，
// 用于上传采集产物到 MinIO/S3/COS。
message CosConfig {
  string endpoint   = 1;  // 对象存储地址，如 minio:9000
  string access_key = 2;  // access key
  string secret_key = 3;  // secret key
  string bucket     = 4;  // 默认 bucket 名称
  string region     = 5;  // 区域（可选，MinIO 留空）
}


// File 内联传输用的小文件结构。
// 小于 1 MB 的文件可以直接放在 gRPC 消息中传输，不经过对象存储。
message File {
  string filename     = 1;
  bytes  content      = 2;
  string content_type = 3;  // MIME 类型，如 application/octet-stream
  int64  size_bytes   = 4;
}
