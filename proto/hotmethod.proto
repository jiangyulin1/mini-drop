// hotmethod.proto — 任务描述与结果上报服务
//
// 定义了 TaskDesc（任务描述，Server → Agent）和 TaskResult（结果上报，Agent → Server）。
// 这是整个系统最核心的消息结构——它描述了一次性能采集任务的完整参数和产出。

syntax = "proto3";

package mini_drop;

import "common.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/jiangyulin1/mini-drop/proto;mini_drop";


service Hotmethod {
  // Agent 采集完成后上报结果。
  rpc NotifyResult(TaskResult) returns (google.protobuf.Empty);
}


// TaskDesc 描述一次采集任务的完整参数。
// 嵌入在 HealthCheckResponse 中，Agent 心跳时拉取。
message TaskDesc {
  string task_id         = 1;  // 全局唯一任务 ID
  uint32 task_type       = 2;  // 任务大类: 0=通用 1=Java 2=Tracing 4=MemCheck 6=JavaHeap
  uint32 profiler_type   = 3;  // 采集工具: 0=perf 1=async-profiler 2=pprof 3=py-spy 4=bpftrace
  RecordArgv sample_argv = 4;  // 采集参数
  string container_name  = 5;  // 容器/Pod 名称（非容器场景为空）
  uint32 container_type  = 6;  // 容器运行时类型
  uint32 timeout_sec     = 7;  // 任务超时秒数，Agent 应在此时限内完成采集
  CosConfig cos_config   = 8;  // 对象存储上传凭证（本次任务专用，覆盖全局配置）
  string script_content  = 9;  // 仅 ScriptExec 类任务使用，存放脚本内容
}


// RecordArgv 采集器的命令行参数。
message RecordArgv {
  uint32 hz         = 1;  // 采样频率 (Hz)，如 99
  uint64 duration   = 2;  // 采集时长 (秒)
  int32  pid        = 3;  // 目标进程 PID
  string callgraph  = 4;  // 调用栈展开模式: fp / dwarf / lbr
  bool   subprocess = 5;  // 是否包含子进程
  string event      = 6;  // perf event 类型，如 cpu-cycles / cache-misses
}


// TaskResult Agent 采集完成后上报的结果。
message TaskResult {
  string task_id                     = 1;
  string error_message               = 2;  // 空字符串表示成功，非空表示失败原因
  File   file                        = 3;  // 小文件内联（≤ 1MB），大文件走对象存储
  string cos_key                     = 4;  // 大文件的对象存储 key
  repeated PidStats self_pstats      = 5;  // 采集期间 Agent 自身资源时间序列
  repeated PidStats children_pstats  = 6;  // 子进程资源时间序列

  // artifact_type 和 artifact_metadata 用于描述产物的类型和元数据。
  // Server 收到后写入 artifacts 表。
  string artifact_type               = 7;  // raw / folded / flamegraph_svg / top_json / ebpf_metrics
  string artifact_metadata_json      = 8;  // JSON 序列化的元数据，含 bucket/object_key/content_type/size_bytes
}
