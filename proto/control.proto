// control.proto — Web → Server 控制面服务
//
// 供 Server 内部使用。apiserver（或 Mini-Drop 中的 FastAPI 层）通过 gRPC
// 调用这些 RPC 创建任务和查询 Agent 状态。
// 注意：这不是面向 Agent 的服务——Agent 不会调用这些 RPC。

syntax = "proto3";

package mini_drop;

import "common.proto";
import "hotmethod.proto";

option go_package = "github.com/jiangyulin1/mini-drop/proto;mini_drop";


service Control {
  // Web 前端创建任务：写入 PENDING，Agent 下次心跳时拉取。
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);

  // 查询指定 Agent 当前资源占用和在线状态。
  rpc StatAgent(StatAgentRequest) returns (StatAgentResponse);
}


message CreateTaskRequest {
  string  target_ip = 1;  // 目标 Agent IP，Server 根据 IP 定位任务队列
  string  task_id   = 2;  // 由调用方预分配的任务 ID
  TaskDesc task_desc = 3;  // 任务完整描述
}


message CreateTaskResponse {
  string task_id = 1;  // 确认创建的任务 ID
  string status  = 2;  // 创建后状态，固定为 "PENDING"
}


message StatAgentRequest {
  string agent_id = 1;
}


message StatAgentResponse {
  PidStats current_stats = 1;   // Agent 最近一次上报的资源占用
  string   agent_status  = 2;   // ONLINE / OFFLINE
}
