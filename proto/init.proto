// init.proto — Agent 注册与配置拉取服务
//
// Agent 启动时调用 RegisterAgent 告知 Server 自身元数据，
// 然后调用 FetchConfig 获取对象存储凭证。
// 如果 Agent 之前处于 OFFLINE 状态，RegisterAgent 后 Server 自动写入 AGENT_ONLINE 审计日志。

syntax = "proto3";

package mini_drop;

import "common.proto";

option go_package = "github.com/jiangyulin1/mini-drop/proto;mini_drop";


service InitAgent {
  // Agent 启动注册：上报 hostname、IP、能力集，Server 返回心跳间隔。
  rpc RegisterAgent(RegisterAgentRequest) returns (RegisterAgentResponse);

  // 获取对象存储临时凭证，用于后续采集产物上传。
  rpc FetchConfig(FetchConfigRequest) returns (FetchConfigResponse);
}


message RegisterAgentRequest {
  string hostname             = 1;  // 主机名，如 ubuntu-demo
  string ip_addr              = 2;  // 上报 IP，如 10.0.0.5
  string agent_id             = 3;  // Agent 唯一标识，环境变量注入
  string version              = 4;  // Agent 版本号
  string os_info              = 5;  // OS 和内核信息，如 "Ubuntu 22.04, kernel 5.15"
  repeated string capabilities = 6; // 支持的采集器: ["perf_cpu","ebpf_io","pyspy","continuous_perf"]
}


message RegisterAgentResponse {
  int32 heartbeat_interval_sec = 1;  // Server 指定的心跳间隔，默认 5 秒
}


message FetchConfigRequest {
  string agent_id = 1;
}


message FetchConfigResponse {
  CosConfig cos_config = 1;  // MinIO/S3 临时凭证
}
