// healthcheck.proto — Agent 心跳与任务下发服务
//
// 这是 Agent ↔ Server 通信频率最高的 RPC（1 Hz）。
// Agent 每次心跳上报自身和子进程资源占用，
// Server 在响应中夹带待执行任务（如果有）。
// 一次 RPC 完成两件事：保活 + 任务拉取。

syntax = "proto3";

package mini_drop;

import "common.proto";
import "hotmethod.proto";

option go_package = "github.com/jiangyulin1/mini-drop/proto;mini_drop";


service HealthCheck {
  // Agent 每秒一次心跳，Server 在响应中返回待派任务。
  rpc Do(HealthCheckRequest) returns (HealthCheckResponse);
}


message HealthCheckRequest {
  string hostname          = 1;  // 主机名
  string ip_addr           = 2;  // IP 地址
  string agent_id          = 3;  // Agent 唯一 ID
  string agent_version     = 4;  // 当前版本
  PidStats self_pstats     = 5;  // Agent 自身资源开销
  PidStats children_pstats = 6;  // 采集器子进程聚合开销
  bool busy                = 7;  // Agent 正在执行任务时只心跳，不拉取新任务
}


message HealthCheckResponse {
  enum ServingStatus {
    UNKNOWN     = 0;
    SERVING     = 1;  // Server 正常，Agent 继续心跳
    NOT_SERVING = 2;  // Server 即将关闭，Agent 应断开并等待重连
  }

  ServingStatus status  = 1;
  bool pending          = 2;         // true 表示有任务待执行
  TaskDesc task_desc    = 3;         // 待执行任务详情，仅在 pending=true 时有意义
}
