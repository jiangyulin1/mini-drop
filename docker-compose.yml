# Mini-Drop 全栈部署配置
#
# 启动: docker compose up -d
# 停止: docker compose down
# 查看日志: docker compose logs -f
#
# 生产部署前:
#   1. cp .env.example .env 并填写密钥
#   2. 设置 MINI_DROP_API_AUTH_ENABLED=1
#   3. 设置 MINI_DROP_GRPC_AUTH_ENABLED=1
#   4. 启用 gRPC TLS: MINI_DROP_GRPC_SECURE=1 + 证书
#   5. 考虑减少 Agent 特权（非生产环境保留 privileged 用于调试）

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mini_drop}
      POSTGRES_USER: ${POSTGRES_USER:-mini_drop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mini_drop}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mini_drop"]
      interval: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-08T15-41-24Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-mini_drop}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-mini_drop_secret}
    expose:
      - "9000"
      - "9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  server:
    build:
      context: .
      dockerfile: deploy/dockerfiles/server.Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://mini_drop:mini_drop@postgres:5432/mini_drop}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-mini_drop}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-mini_drop_secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-mini-drop}
      MINIO_AUTO_CREATE_BUCKET: ${MINIO_AUTO_CREATE_BUCKET:-1}
      MINI_DROP_API_AUTH_ENABLED: ${MINI_DROP_API_AUTH_ENABLED:-1}
      MINI_DROP_API_KEY: ${MINI_DROP_API_KEY:-}
      MINI_DROP_GRPC_AUTH_ENABLED: ${MINI_DROP_GRPC_AUTH_ENABLED:-1}
      MINI_DROP_GRPC_TOKEN: ${MINI_DROP_GRPC_TOKEN:-}
    expose:
      - "8191"
      - "50051"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8191/api/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "2.0"

  agent:
    build:
      context: .
      dockerfile: deploy/dockerfiles/agent.Dockerfile
    environment:
      AGENT_GRPC_ADDR: server:50051
      AGENT_ID: ${AGENT_ID:-agent_docker_demo}
      AGENT_HEARTBEAT_INTERVAL_SEC: ${AGENT_HEARTBEAT_INTERVAL_SEC:-5}
      MINI_DROP_GRPC_TOKEN: ${MINI_DROP_GRPC_TOKEN:-}
      AGENT_UPLOAD_ARTIFACTS: ${AGENT_UPLOAD_ARTIFACTS:-1}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-mini_drop}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-mini_drop_secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-mini-drop}
    depends_on:
      server:
        condition: service_healthy
      minio:
        condition: service_healthy
    # 注意: 生产环境应评估是否需要 privileged + host PID
    # 最小权限方案：仅 cap_add SYS_PTRACE + PERFMON + /proc 只读挂载
    privileged: false
    pid: host
    cap_add:
      - SYS_PTRACE
      - PERFMON
    security_opt:
      - no-new-privileges:true
    read_only: false
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "2.0"

  web:
    build:
      context: .
      dockerfile: deploy/dockerfiles/web.Dockerfile
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

volumes:
  pgdata:
  miniodata:
