# Mini-Drop 全栈部署配置
#
# 启动: docker compose up -d
# 停止: docker compose down
# 查看日志: docker compose logs -f
#
# 演示环境要求:
#   Ubuntu 22.04 / Docker Compose v2 / perf / bpftrace / py-spy
#   Agent 容器需要 privileged + pid:host 才能执行采集

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mini_drop}
      POSTGRES_USER: ${POSTGRES_USER:-mini_drop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mini_drop}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mini_drop"]
      interval: 5s
      retries: 5

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-mini_drop}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-mini_drop_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: deploy/dockerfiles/server.Dockerfile
    env_file:
      - .env.example
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://mini_drop:mini_drop@postgres:5432/mini_drop}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-mini_drop}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-mini_drop_secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-mini-drop}
      MINIO_AUTO_CREATE_BUCKET: ${MINIO_AUTO_CREATE_BUCKET:-1}
      MINI_DROP_API_AUTH_ENABLED: ${MINI_DROP_API_AUTH_ENABLED:-0}
      MINI_DROP_API_KEY: ${MINI_DROP_API_KEY:-}
      MINI_DROP_GRPC_AUTH_ENABLED: ${MINI_DROP_GRPC_AUTH_ENABLED:-0}
      MINI_DROP_GRPC_TOKEN: ${MINI_DROP_GRPC_TOKEN:-}
    ports:
      - "8191:8191"
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8191/api/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  agent:
    build:
      context: .
      dockerfile: deploy/dockerfiles/agent.Dockerfile
    environment:
      AGENT_GRPC_ADDR: server:50051
      AGENT_ID: ${AGENT_ID:-agent_docker_demo}
      AGENT_HEARTBEAT_INTERVAL_SEC: ${AGENT_HEARTBEAT_INTERVAL_SEC:-5}
      MINI_DROP_GRPC_TOKEN: ${MINI_DROP_GRPC_TOKEN:-}
      AGENT_UPLOAD_ARTIFACTS: ${AGENT_UPLOAD_ARTIFACTS:-1}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-mini_drop}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-mini_drop_secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-mini-drop}
    depends_on:
      server:
        condition: service_healthy
      minio:
        condition: service_healthy
    privileged: true
    pid: host
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
      - PERFMON

  web:
    build:
      context: .
      dockerfile: deploy/dockerfiles/web.Dockerfile
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s

volumes:
  pgdata:
  miniodata:
